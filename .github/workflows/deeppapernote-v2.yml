name: DeepPaperNote v2 CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.12"
          - os: windows-latest
            python: "3.11"
    runs-on: ${{ matrix.os }}

    env:
      PYTHONUTF8: "1"

    defaults:
      run:
        working-directory: .agents/skills/DeepPaperNote

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: .agents/skills/DeepPaperNote/pyproject.toml

      - name: Install skill and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile scripts and tests
        run: python -m compileall -q scripts tests

      - name: Check static quality
        run: python -m ruff check scripts tests

      - name: Check every retained CLI
        run: python -m pytest -q tests -k retained_cli_help

      - name: Run offline pipeline and publish integration tests
        run: python -m pytest -q tests/test_pipeline_publish_integration_v2.py

      - name: Run full test suite
        run: python -m pytest -q tests

      - name: Validate tracked Vault
        run: python scripts/lint_vault.py --vault ../../.. --allow-missing-local-pdfs
