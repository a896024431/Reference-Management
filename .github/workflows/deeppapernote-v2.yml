name: DeepPaperNote v2 CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: .agents/skills/DeepPaperNote

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: .agents/skills/DeepPaperNote/pyproject.toml

      - name: Install skill and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile scripts and tests
        run: python -m compileall -q scripts tests

      - name: Check final v2 entrypoint
        run: python scripts/run_pipeline_final_v2.py --help

      - name: Check v2 static quality
        run: >-
          python -m ruff check
          scripts/*_v2.py
          scripts/extract_evidence_v2
          scripts/figure_contracts.py
          scripts/lint_vault.py
          scripts/rebuild_paper_navigation.py
          scripts/vault.py
          tests/test_rebuild_paper_navigation.py
          tests/test_*_v2.py

      - name: Run full test suite
        run: python -m pytest -q tests

      - name: Validate tracked Vault
        run: python scripts/lint_vault.py --vault ../../..
